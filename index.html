<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird - Rewarded AdsGram integration</title>
    
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #2c3e50;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        #gameContainer {
            position: relative;
            width: 320px;
            height: 480px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        canvas {
            background-color: #70c5ce; /* Sky color */
            display: block;
        }

        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            text-align: center;
        }

        .ui-layer.active {
            display: flex;
        }

        h1 {
            margin-top: 0;
            font-size: 32px;
            text-shadow: 2px 2px 0 #000;
        }

        p {
            font-size: 20px;
        }

        button {
            margin: 10px;
            padding: 12px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 2px solid #000;
            border-radius: 8px;
            background: #f1c40f;
            color: #333;
            font-weight: bold;
            box-shadow: 0 4px 0 #000;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        button:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #000;
        }

        .btn-ad {
            background: #2ecc71;
            color: white;
        }
    </style>
</head>
<body>

    <div id="gameContainer">
        <canvas id="gameCanvas" width="320" height="480"></canvas>
        
        <div id="startScreen" class="ui-layer active">
            <h1>Flappy Bird</h1>
            <p>Click, Tap, or Space to fly</p>
            <button onclick="startGame()">Start Game</button>
        </div>

        <div id="gameOverScreen" class="ui-layer">
            <h1>Game Over</h1>
            <p>Score: <span id="finalScore">0</span></p>
            <button class="btn-ad" onclick="watchAdToRevive()">📺 Watch Ad to Revive</button>
            <button onclick="resetGame()">Restart</button>
        </div>
    </div>

    <script>
        // 1. Initialize AdsGram SDK
        const AdController = window.Adsgram.init({ blockId: "26330" });

        // 2. Game Setup
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        
        let frames = 0;
        let currentScore = 0;
        let gameState = "start"; // Can be: 'start', 'playing', 'gameover'
        
        // Bird object
        const bird = {
            x: 50, y: 150, width: 24, height: 24,
            gravity: 0.25, velocity: 0, jump: -5,
            draw() {
                ctx.fillStyle = "#f1c40f"; // Bird color (yellow)
                ctx.fillRect(this.x, this.y, this.width, this.height);
                // Draw a simple eye
                ctx.fillStyle = "#000";
                ctx.fillRect(this.x + 14, this.y + 4, 4, 4);
            },
            update() {
                this.velocity += this.gravity;
                this.y += this.velocity;
                
                // Floor or ceiling collision
                if (this.y + this.height >= canvas.height || this.y <= 0) {
                    triggerGameOver();
                }
            },
            flap() {
                this.velocity = this.jump;
            }
        };

        // Pipes object
        const pipes = {
            items: [],
            width: 45,
            gap: 130, // Gap between top and bottom pipe
            dx: 2.5,  // Speed of pipes moving left
            draw() {
                ctx.fillStyle = "#2ecc71"; // Pipe color (green)
                for (let i = 0; i < this.items.length; i++) {
                    let p = this.items[i];
                    // Draw top pipe
                    ctx.fillRect(p.x, 0, this.width, p.top);
                    // Draw bottom pipe
                    ctx.fillRect(p.x, p.top + this.gap, this.width, canvas.height - p.top - this.gap);
                }
            },
            update() {
                // Add new pipes periodically
                if (frames % 90 === 0) {
                    // Randomize gap position
                    let minPipeHeight = 40;
                    let maxPipeHeight = canvas.height - this.gap - minPipeHeight;
                    let topPosition = Math.random() * (maxPipeHeight - minPipeHeight) + minPipeHeight;
                    
                    this.items.push({ x: canvas.width, top: topPosition, passed: false });
                }
                
                for (let i = 0; i < this.items.length; i++) {
                    let p = this.items[i];
                    p.x -= this.dx;

                    // Collision detection with Bird
                    if (bird.x < p.x + this.width && bird.x + bird.width > p.x &&
                        (bird.y < p.top || bird.y + bird.height > p.top + this.gap)) {
                        triggerGameOver();
                    }

                    // Score update when passing a pipe
                    if (p.x + this.width < bird.x && !p.passed) {
                        currentScore++;
                        p.passed = true;
                    }

                    // Remove pipes that move off screen
                    if (p.x + this.width < 0) {
                        this.items.shift();
                        i--;
                    }
                }
            },
            reset() {
                this.items = [];
            }
        };

        // Draw Score HUD
        function drawScoreHUD() {
            ctx.fillStyle = "#fff";
            ctx.font = "bold 28px Arial";
            ctx.strokeStyle = "#000";
            ctx.lineWidth = 3;
            ctx.strokeText(currentScore, canvas.width / 2 - 10, 40);
            ctx.fillText(currentScore, canvas.width / 2 - 10, 40);
        }

        // Main Game Loop
        function loop() {
            if (gameState !== "playing") return;
            
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Update & Draw entities
            bird.draw();
            bird.update();
            
            pipes.draw();
            pipes.update();
            
            drawScoreHUD();
            
            frames++;
            requestAnimationFrame(loop);
        }

        // --- Controls ---
        function handleInput() {
            if (gameState === "playing") {
                bird.flap();
            }
        }
        window.addEventListener("keydown", (e) => {
            if (e.code === "Space") handleInput();
        });
        canvas.addEventListener("touchstart", handleInput);
        canvas.addEventListener("mousedown", handleInput);

        // --- State Management ---
        function startGame() {
            document.getElementById("startScreen").classList.remove("active");
            gameState = "playing";
            bird.y = 150;
            bird.velocity = 0;
            pipes.reset();
            currentScore = 0;
            frames = 0;
            loop();
        }

        function triggerGameOver() {
            gameState = "gameover";
            document.getElementById("gameOverScreen").classList.add("active");
            document.getElementById("finalScore").innerText = currentScore;
        }

        function resetGame() {
            document.getElementById("gameOverScreen").classList.remove("active");
            startGame();
        }

        // --- REWARDED AD LOGIC ---
        function watchAdToRevive() {
            if (!AdController) {
                alert("Ad System not ready yet!");
                return;
            }

            // Show the Rewarded Ad
            AdController.show()
                .then((result) => {
                    // Promise resolved = User watched the ad completely
                    console.log("Ad watched successfully! Rewarding player...");
                    revivePlayer();
                })
                .catch((error) => {
                    // Promise rejected = Ad skipped, closed early, or failed to load
                    console.log("Ad skipped or failed.", error);
                    alert("Ad skipped or failed to load. Please try again or restart.");
                });
        }

        function revivePlayer() {
            // Hide the game over screen
            document.getElementById("gameOverScreen").classList.remove("active");
            
            // Give the bird a safe space by removing immediate pipes
            pipes.items = pipes.items.filter(p => p.x > bird.x + 150);
            
            // Put bird in a safe vertical position with 0 velocity
            bird.y = canvas.height / 2;
            bird.velocity = 0;
            
            // Resume the game
            gameState = "playing";
            loop(); 
        }
    </script>
</body>
</html>
